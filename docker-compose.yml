services:
  postgres:
    image: postgres:15-alpine
    container_name: tinyurl_postgres
    restart: always
    environment:
      POSTGRES_USER: tinyuser
      POSTGRES_PASSWORD: tinypassword
      POSTGRES_DB: tinyurl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinyuser -d tinyurl_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tinyurl_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: tinyurl_app
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://tinyuser:tinypassword@postgres:5432/tinyurl_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
volumes:
  postgres_data:
  redis_data:
