version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tinyurl_postgres
    restart: always
    environment:
      POSTGRES_USER: tinyuser
      POSTGRES_PASSWORD: tinypassword
      POSTGRES_DB: tinyurl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: tinyurl_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
